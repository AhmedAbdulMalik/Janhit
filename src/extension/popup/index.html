<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Janhit</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Clicky Buddy</h1>
      <p class="subtitle">A browser-native voice companion with pointing and highlights.</p>
    </div>

    <div class="voice-control">
      <button
        id="voice-btn"
        class="voice-btn"
        type="button"
        aria-pressed="false"
        title="Press and hold to record. Shortcut: hold Alt+S on Windows/Linux or Option+S on Mac while this popup is focused."
      >
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <path d="M12 1a3 3 0 0 0-3 3v12a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
          <line x1="8" y1="23" x2="16" y2="23"></line>
        </svg>
      </button>
      <p class="toggle-label" id="toggle-label">Ready</p>
      <p class="status-text" id="status">Press and hold the mic button to start a real microphone capture.</p>
      <p class="shortcut-text">Hold <strong>Alt + S</strong> on Windows/Linux</p>
      <p class="shortcut-text">Hold <strong>Option + S</strong> on Mac</p>
    </div>

    <div class="assistant-panel">
      <p class="assistant-heading">Voice Flow</p>
      <p class="assistant-copy" id="response-text">Press and hold to send your speech to Janhit.</p>
    </div>
    <div id="dom-action-confirm" class="dom-action-confirm" style="display:none; padding:10px; border-top:1px solid #eee;">
      <p id="dom-action-text" style="margin:0 0 8px 0; font-size:13px; color:#111"></p>
      <div style="display:flex; gap:8px;">
        <button id="dom-action-accept" style="background:#0ea5e9;color:#fff;border:none;padding:8px 10px;border-radius:6px;">Confirm</button>
        <button id="dom-action-reject" style="background:#ef4444;color:#fff;border:none;padding:8px 10px;border-radius:6px;">Cancel</button>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
